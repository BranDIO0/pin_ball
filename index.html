﻿<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Pin Ball</title>
    <!-- CSS -->
    <link rel="stylesheet" href="css/main.css">
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Cannon.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>
    
    <!-- Game Scripts -->
    <script src="js/config.js"></script>
    <script src="js/textures.js"></script>
    <script src="js/physics.js"></script>
    <script src="js/scene.js"></script>
    <script src="js/droptargets.js"></script>
    <script src="js/game.js"></script>
    <script src="js/preview.js"></script>
    <script src="js/input.js"></script>
    <script src="js/main.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div class="top-bar">
            <!-- Neuer Button für die Ball-Auswahl -->
            <button class="btn" onclick="openBallModal()">BÄLLE</button>
            
            <div class="score-board">
                <span class="score-label">SCORE</span>
                <span id="score" class="score-value">000000</span>
            </div>

            <div class="lives-board">
                <span class="lives-label">LIVES</span>
                <span id="lives" class="lives-value">3</span>
            </div>
        </div>

        <div class="touch-zones">
            <div id="left-touch" class="touch-area">
                <div class="hint">L-FLIPPER</div>
            </div>
            <div id="right-touch" class="touch-area">
                <div class="hint">R-FLIPPER</div>
            </div>
        </div>

        <div id="plunger-container">
            <div class="plunger-track">
                <div id="plunger-handle">▼</div>
            </div>
            <div class="plunger-hint">ZIEHEN</div>
        </div>
    </div>

    <!-- Modal für Ballauswahl & Detailansicht -->
    <div id="ball-modal">
        <div class="modal-title">BALL LABOR</div>
        <div class="modal-subtitle">ZUM DREHEN WISCHEN</div>
        
        <div id="preview-canvas-container"></div>
        
        <div class="ball-options" id="ball-options-container">
            <!-- Buttons werden via JS generiert -->
        </div>

        <button class="btn" onclick="closeBallModal()" style="font-size: 18px; padding: 12px 30px;">ZURÜCK ZUM SPIEL</button>
    </div>

    <div id="loading">Lade Physik & 3D...</div>
</body>
</html>
            const canvas = document.createElement('canvas');
